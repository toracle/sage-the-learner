name: Build Book

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Nanum fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-nanum fonts-nanum-coding
          fc-cache -fv

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true   # reads .ruby-version, runs bundle install and caches

      - name: Build HTML
        run: |
          mkdir -p dist
          bundle exec asciidoctor \
            -d book \
            -a github-url=${{ github.server_url }}/${{ github.repository }} \
            -o dist/book.html \
            book.adoc
          cp dist/book.html dist/index.html

      - name: Build PDF
        run: |
          bundle exec asciidoctor-pdf \
            -d book \
            -a pdf-theme=themes/korean-theme.yml \
            -a pdf-fontsdir=/usr/share/fonts/truetype/nanum \
            -a allow-uri-read \
            -a github-url=${{ github.server_url }}/${{ github.repository }} \
            -o dist/book.pdf \
            book.adoc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sage-learner-book
          path: dist/
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body: |
            빌드: ${{ github.sha }}
          files: |
            dist/book.html
            dist/book.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4
