name: Build Book

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nanum fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-nanum fonts-nanum-coding
          fc-cache -fv

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true   # reads .ruby-version, runs bundle install and caches

      - name: Build HTML
        run: |
          mkdir -p dist
          bundle exec asciidoctor \
            -d book \
            -o dist/book.html \
            book.adoc

      - name: Build PDF
        run: |
          bundle exec asciidoctor-pdf \
            -d book \
            -a pdf-theme=themes/korean-theme.yml \
            -a pdf-fontsdir=/usr/share/fonts/truetype/nanum \
            -o dist/book.pdf \
            book.adoc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sage-learner-book
          path: dist/
          retention-days: 30

      - name: Create Release (on push to main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "빌드 #${{ github.run_number }}"
          body: |
            자동 빌드: ${{ github.sha }}
          files: |
            dist/book.html
            dist/book.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
