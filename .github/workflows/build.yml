name: Build Book

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true   # reads .ruby-version, runs bundle install and caches

      - name: Install fonttools
        run: pip3 install fonttools

      - name: Build HTML + PDF
        run: make all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sage-learner-book
          path: dist/
          retention-days: 30

      - name: Rename PDFs for release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp dist/book.pdf      release/sage-the-learner-en.pdf
          cp dist/ko/book.pdf   release/sage-the-learner-ko.pdf

      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body: |
            Build: ${{ github.sha }}
          files: |
            release/sage-the-learner-en.pdf
            release/sage-the-learner-ko.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4
