# Korean Book Theme for 현자 세이지의 비법
# Requires Noto CJK fonts (fonts-noto-cjk-extra, fonts-noto-mono)
extends: default

font:
  catalog:
    NotoSerifKR:
      normal: NotoSerifKR-Regular.ttf
      bold: NotoSerifKR-Bold.ttf
      italic: NotoSerifKR-Regular.ttf
      bold_italic: NotoSerifKR-Bold.ttf
    NotoSansKR:
      normal: NotoSansKR-Regular.ttf
      bold: NotoSansKR-Bold.ttf
      italic: NotoSansKR-Regular.ttf
      bold_italic: NotoSansKR-Bold.ttf
    NotoMono:
      normal: NotoMono-Regular.ttf
      bold: NotoMono-Regular.ttf
      italic: NotoMono-Regular.ttf
      bold_italic: NotoMono-Regular.ttf
  fallbacks:
    - NotoSerifKR

page:
  size: [176mm, 250mm]
  margin: [20mm, 22mm, 22mm, 25mm]   # top right bottom left
  background_color: FFFFFF

base:
  font_family: NotoSerifKR
  font_size: 10.5
  font_color: 111111
  line_height: 1.75
  font_style: normal

vertical_rhythm: 12

heading:
  font_family: NotoSansKR
  font_style: bold
  font_color: 111111
  line_height: 1.2
  margin_top: $vertical_rhythm * 1.5
  margin_bottom: $vertical_rhythm * 0.5

h1:
  font_size: 26
  font_color: 1A1A1A
  margin_top: 0
h2:
  font_size: 18
  font_color: 1A1A1A
h3:
  font_size: 14
h4:
  font_size: 12

part:
  font_family: NotoSansKR
  font_size: 30
  font_style: bold
  font_color: 1A1A1A
  text_align: left

chapter:
  font_family: NotoSansKR
  font_style: bold

prose:
  margin_bottom: $vertical_rhythm

quote:
  font_style: italic
  border_left_width: 3
  border_left_color: AAAAAA
  border_right_width: 0
  padding: [4, 12, 4, 12]
  margin_side: 20
  cite_font_size: 9
  cite_font_color: 777777

admonition:
  column_rule_width: 0
  padding: [6, 10, 6, 10]
  label:
    font_family: NotoSansKR
    font_size: 8
    font_style: bold

admonition_tip:
  background_color: F0F4FB
  border_left_width: 3
  border_left_color: B4A7D6
  label:
    font_color: B4A7D6

admonition_note:
  background_color: FFF4F3
  border_left_width: 3
  border_left_color: E89B8C
  label:
    font_color: E89B8C

admonition_important:
  background_color: F2F8F5
  border_left_width: 3
  border_left_color: 7A9B76
  label:
    font_color: 7A9B76

admonition_warning:
  background_color: FFF8E7
  border_left_width: 3
  border_left_color: F4A460
  label:
    font_color: C8860A

admonition_caution:
  background_color: FFF0F0
  border_left_width: 3
  border_left_color: E05252
  label:
    font_color: E05252

example:
  background_color: F5F1E8
  border_width: 1
  border_color: E89B8C
  border_radius: 3
  padding: [8, 10, 8, 10]
  title:
    font_family: NotoSansKR
    font_size: 10
    font_style: bold
    font_color: 333333

sidebar:
  background_color: F2F8F5
  border_width: 1
  border_color: 7A9B76
  border_radius: 3
  padding: [8, 10, 8, 10]
  title:
    font_family: NotoSansKR
    font_size: 10
    font_style: bold

codespan:
  font_family: NotoMono
  font_size: 9.5

code:
  font_family: NotoMono
  font_size: 9.5
  padding: [4, 8, 4, 8]
  background_color: F5F5F5
  border_color: DDDDDD
  border_width: 0.5
  border_radius: 2

table:
  font_family: NotoSerifKR
  font_size: 9.5
  border_color: CCCCCC
  border_width: 0.5
  cell_padding: [4, 6]
  head:
    font_family: NotoSansKR
    font_style: bold
    background_color: EFEFEF
    font_color: 111111
  odd_row_background_color: FFFFFF
  even_row_background_color: FAFAFA
  foot:
    background_color: EFEFEF

horizontal_rule:
  border_color: CCCCCC
  border_width: 0.5
  margin: [6, 0]

toc:
  font_family: NotoSansKR
  font_size: 10
  indent: 20
  line_height: 1.6
  dot_leader_color: AAAAAA
  dot_leader_font_style: normal

header:
  font_family: NotoSansKR
  font_size: 8
  font_color: 888888
  border_bottom_color: DDDDDD
  border_bottom_width: 0.5
  height: 16mm
  line_height: 1
  recto:
    right:
      content: '{section-title}'
  verso:
    left:
      content: '{doctitle}'

footer:
  font_family: NotoSansKR
  font_size: 9
  font_color: 666666
  border_top_color: DDDDDD
  border_top_width: 0.5
  height: 14mm
  line_height: 1
  recto:
    right:
      content: '{page-number}'
  verso:
    left:
      content: '{page-number}'
